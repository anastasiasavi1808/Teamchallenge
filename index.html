<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Vistabeans Management Dashboard — Analisi profittabilità prodotti, geografia e raccomandazioni strategiche.">
<title>Vistabeans — Interactive Dashboard</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- SheetJS for Excel import -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- html2canvas + jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════════
   DESIGN TOKENS — Coffee palette inspired by Vistabean
   ═══════════════════════════════════════════════════════ */
:root {
  --bg: #f5f0e8;
  --bg-warm: #efe8dc;
  --surface: #ffffff;
  --surface2: #faf7f2;
  --surface3: #f0ebe3;

  --primary: #5a3e2b;
  --primary-light: #7a5c44;
  --primary-dark: #3d2a1b;

  --accent: #2b5a3e;
  --accent-light: #3a7a54;
  --accent-bg: #e8f2ec;

  --text: #2c1e12;
  --text-secondary: #7a6b5d;
  --text-muted: #a89888;

  --border: #ddd4c8;
  --border-light: #e8e0d4;

  --green: #2b8a5e;
  --green-bg: #e6f5ed;
  --green-text: #1a5c3c;

  --amber: #c07b1a;
  --amber-bg: #fdf2dc;
  --amber-text: #7a4e0f;

  --red: #c94444;
  --red-bg: #fce8e8;
  --red-text: #8a2c2c;

  --blue: #2a6cb6;
  --blue-bg: #e4f0fc;
  --blue-text: #1a4a7a;

  --radius: 14px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --shadow: 0 1px 3px rgba(90,62,43,0.06), 0 4px 12px rgba(90,62,43,0.04);
  --shadow-lg: 0 4px 16px rgba(90,62,43,0.08), 0 12px 40px rgba(90,62,43,0.06);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);

  --sidebar-w: 260px;
}

/* ═══════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════ */
.app {
  display: flex;
  min-height: 100vh;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--primary-dark);
  color: #fff;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-logo {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-logo .bean-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.sidebar-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-top: 6px;
  letter-spacing: 0.03em;
}

.sidebar-nav {
  list-style: none;
  padding: 16px 12px;
  flex: 1;
}

.sidebar-nav li { margin-bottom: 4px; }

.nav-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition);
  cursor: pointer;
}

.nav-link:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.9);
}

.nav-link.active {
  background: rgba(255,255,255,0.12);
  color: #fff;
  font-weight: 600;
}

.nav-link .nav-icon {
  font-size: 18px;
  width: 24px;
  text-align: center;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.upload-area {
  background: rgba(255,255,255,0.06);
  border: 1px dashed rgba(255,255,255,0.2);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
}

.upload-area:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.35);
}

.upload-area label {
  display: block;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
}

.upload-area label strong {
  display: block;
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  margin-bottom: 4px;
}

.upload-area input { display: none; }

.upload-status {
  font-size: 10px;
  color: var(--accent-light);
  margin-top: 6px;
  display: none;
}

.upload-status.show { display: block; }

/* ─── MAIN CONTENT ─── */
.content {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 28px 32px 60px;
  min-height: 100vh;
}

/* ─── MOBILE BURGER ─── */
.burger {
  display: none;
  position: fixed;
  top: 14px; left: 14px;
  z-index: 200;
  width: 40px; height: 40px;
  background: var(--primary-dark);
  border: none;
  border-radius: var(--radius-xs);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

/* ═══════════════════════════════════════════════════════
   PAGE HEADER
   ═══════════════════════════════════════════════════════ */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}

.page-header h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
}

.page-header p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
}

.btn:hover {
  background: var(--surface2);
  box-shadow: var(--shadow);
}

.btn-primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.btn-primary:hover {
  background: var(--primary-light);
}

/* ═══════════════════════════════════════════════════════
   SECTION LABEL
   ═══════════════════════════════════════════════════════ */
.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 28px 0 14px;
}

/* ═══════════════════════════════════════════════════════
   KPI CARDS
   ═══════════════════════════════════════════════════════ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}

.kpi {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 20px 22px;
  box-shadow: var(--shadow);
  transition: transform var(--transition), box-shadow var(--transition);
}

.kpi:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.kpi-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}

.kpi-val {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 6px;
}

.kpi-sub {
  font-size: 11px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}

.kpi-sub.up { color: var(--green-text); }
.kpi-sub.down { color: var(--red-text); }
.kpi-sub.warn { color: var(--amber-text); }

.kpi-bar {
  height: 4px;
  border-radius: 2px;
  margin-top: 12px;
  background: var(--border-light);
  overflow: hidden;
}

.kpi-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}

/* ═══════════════════════════════════════════════════════
   CARDS & GRID
   ═══════════════════════════════════════════════════════ */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 22px 24px;
  box-shadow: var(--shadow);
}

.card-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 16px;
}

/* ═══════════════════════════════════════════════════════
   TABLE
   ═══════════════════════════════════════════════════════ */
.tbl-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  font-size: 12px;
  min-width: 1000px;
}

thead th {
  background: var(--primary);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 11px 12px;
  text-align: center;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  position: relative;
}

thead th:first-child { text-align: left; }

thead th:hover { background: var(--primary-light); }

thead th .sort-arrow {
  font-size: 9px;
  margin-left: 4px;
  opacity: 0.5;
}

thead th.sorted .sort-arrow { opacity: 1; }

tbody tr { transition: background var(--transition); }
tbody tr:nth-child(odd) { background: var(--surface); }
tbody tr:nth-child(even) { background: var(--surface2); }
tbody tr:hover { background: var(--bg-warm) !important; }

td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-light);
  text-align: center;
}

td:first-child {
  text-align: left;
  font-weight: 600;
  color: var(--primary);
}

tfoot td {
  background: var(--surface3) !important;
  font-weight: 700;
  border-top: 2px solid var(--border);
  color: var(--primary);
}

/* ─── PILLS ─── */
.pill {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

.pill-green { background: var(--green-bg); color: var(--green-text); }
.pill-amber { background: var(--amber-bg); color: var(--amber-text); }
.pill-red { background: var(--red-bg); color: var(--red-text); }

/* ═══════════════════════════════════════════════════════
   BAR ROWS (custom horizontal bars)
   ═══════════════════════════════════════════════════════ */
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 9px;
  font-size: 12px;
}

.bar-label {
  width: 110px;
  font-weight: 500;
  color: var(--text-secondary);
  text-align: right;
  flex-shrink: 0;
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bar-track {
  flex: 1;
  height: 12px;
  background: var(--surface3);
  border-radius: 6px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.5s ease;
}

.bar-num {
  width: 56px;
  text-align: right;
  font-weight: 600;
  flex-shrink: 0;
  font-size: 11px;
}

/* ═══════════════════════════════════════════════════════
   METRIC SELECTOR BUTTONS
   ═══════════════════════════════════════════════════════ */
.sel-row {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.sel-btn {
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-weight: 500;
  transition: all var(--transition);
}

.sel-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  font-weight: 700;
}

.sel-btn:hover:not(.active) {
  background: var(--surface3);
}

/* ═══════════════════════════════════════════════════════
   ACTION / RECOMMENDATION CARDS
   ═══════════════════════════════════════════════════════ */
.action-card {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  transition: transform var(--transition);
}

.action-card:hover {
  transform: translateX(4px);
}

.action-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.action-body { flex: 1; }

.action-tag {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.06em;
  padding: 3px 10px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 6px;
}

.action-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 4px;
}

.action-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 4px;
}

.action-meta {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
}

/* ═══════════════════════════════════════════════════════
   CHART LEGEND
   ═══════════════════════════════════════════════════════ */
.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.legend span {
  display: flex;
  align-items: center;
  gap: 5px;
}

.ld {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  display: inline-block;
}

/* ═══════════════════════════════════════════════════════
   MAP STYLES
   ═══════════════════════════════════════════════════════ */
.map-container {
  position: relative;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.map-svg-wrap {
  width: 100%;
  overflow: hidden;
}

.map-svg-wrap svg {
  width: 100%;
  height: auto;
  display: block;
}

.map-svg-wrap path {
  stroke: var(--surface);
  stroke-width: 1;
  transition: fill var(--transition), transform 0.2s ease;
  cursor: pointer;
}

.map-svg-wrap path:hover {
  filter: brightness(0.88);
  stroke: var(--primary);
  stroke-width: 1.5;
}

.map-popup {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 18px 20px;
  min-width: 280px;
  max-width: 360px;
  z-index: 50;
  display: none;
  animation: popIn 0.25s ease;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.95) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.map-popup.show { display: block; }

.map-popup-close {
  position: absolute;
  top: 8px; right: 10px;
  background: none;
  border: none;
  font-size: 18px;
  color: var(--text-muted);
  cursor: pointer;
}

.map-popup h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 10px;
}

.map-mini-kpi {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}

.map-mini-kpi .mk {
  background: var(--surface2);
  padding: 8px 10px;
  border-radius: var(--radius-xs);
}

.map-mini-kpi .mk-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
}

.map-mini-kpi .mk-val {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
}

.map-alerts .alert-item {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: var(--radius-xs);
  margin-bottom: 4px;
  font-weight: 500;
}

.sparkline-wrap {
  height: 40px;
  margin: 8px 0;
}

.sparkline-wrap canvas {
  width: 100% !important;
  height: 40px !important;
}

/* ═══════════════════════════════════════════════════════
   FILTER BAR
   ═══════════════════════════════════════════════════════ */
.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.filter-bar select, .filter-bar input {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  transition: border-color var(--transition);
}

.filter-bar select:focus, .filter-bar input:focus {
  outline: none;
  border-color: var(--primary);
}

/* ═══════════════════════════════════════════════════════
   SIMULATION CONTROLS (Page 3)
   ═══════════════════════════════════════════════════════ */
.sim-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 22px 24px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
}

.sim-card h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 12px;
}

.sim-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.sim-row label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  min-width: 160px;
}

.sim-row input[type="range"] {
  flex: 1;
  min-width: 150px;
  accent-color: var(--primary);
  height: 6px;
}

.sim-row .sim-val {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  min-width: 60px;
  text-align: right;
}

.sim-result {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border-light);
}

.sim-result .sr {
  text-align: center;
  padding: 10px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
}

.sim-result .sr-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.sim-result .sr-val {
  font-size: 20px;
  font-weight: 700;
}

.sim-result .sr-delta {
  font-size: 11px;
  font-weight: 600;
  margin-top: 2px;
}

/* ═══════════════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════════════ */
.footer {
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════════
   TOAST / NOTIFICATION
   ═══════════════════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--primary);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 500;
  animation: slideUp 0.3s ease;
  display: none;
}

.toast.show { display: block; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════
   TABLE SEARCH / FILTER
   ═══════════════════════════════════════════════════════ */
.table-controls {
  display: flex;
  gap: 10px;

/* ═══════════════════════════════════════════════════════
   EXCEL FILE UPLOAD HANDLER
   ═══════════════════════════════════════════════════════ */
function handleFileUpload(evt) {
  const file = evt.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const firstSheet = wb.SheetNames[0];
      const data = XLSX.utils.sheet_to_json(wb.Sheets[firstSheet]);

      if (data.length > 0) {
        // Try to map Excel columns to our product data
        data.forEach(row => {
          const id = row['ID'] || row['Product ID'] || row['Prodotto'];
          if (id) {
            const num = parseInt(String(id).replace(/\D/g, ''));
            if (num && row['Nome'] || row['Name'] || row['Product Name']) {
              PRODUCT_NAMES[num] = row['Nome'] || row['Name'] || row['Product Name'];
            }
          }
        });

        document.getElementById('upload-status').classList.add('show');
        document.getElementById('upload-status').textContent = `✓ ${file.name} — ${data.length} righe importate`;
        showToast(`File "${file.name}" importato con successo!`);

        // Re-render current page
        handleRoute();
      }
    } catch (err) {
      showToast('⚠ Errore nel parsing del file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ═══════════════════════════════════════════════════════
   PDF EXPORT
   ═══════════════════════════════════════════════════════ */
async function exportPDF(sectionId, title) {
  showToast('Generazione PDF in corso…');
  const el = document.getElementById(sectionId) || document.getElementById('router-view');
  try {
    const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#f5f0e8' });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l', 'mm', 'a4');
    const imgData = canvas.toDataURL('image/png');
    const pdfW = pdf.internal.pageSize.getWidth();
    const pdfH = (canvas.height * pdfW) / canvas.width;
    pdf.setFontSize(16);
    pdf.text(title || 'Vistabeans Report', 14, 14);
    pdf.setFontSize(9);
    pdf.text('Generato il ' + new Date().toLocaleDateString('it-IT'), 14, 20);
    pdf.addImage(imgData, 'PNG', 0, 26, pdfW, Math.min(pdfH, pdf.internal.pageSize.getHeight() - 30));
    pdf.save('Vistabeans_' + (title || 'Report').replace(/\s/g, '_') + '.pdf');
    showToast('✓ PDF scaricato!');
  } catch (err) {
    showToast('⚠ Errore PDF: ' + err.message);
  }
}

function renderProductTable() {

    return `<tr title="Profit/$Mkt: ${p.roi.toFixed(2)}x | Inventario: ${p.inv} | Budget: ${bvs}">

/* TABLE SORT */
let sortCol = -1, sortAsc = true;
function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }

  const keys = ['id','sales','cogs_p','gm','exp_p','mkt_p','profit','nm','roi','inv','bvar'];
  const key = keys[col];
  if (!key) return;

  products.sort((a, b) => {
    const va = col === 0 ? pName(a.id) : a[key];
    const vb = col === 0 ? pName(b.id) : b[key];
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
  renderProductTable();
}

/* TABLE FILTER */
function filterTable(query) {
  const rows = document.querySelectorAll('#prod-tbody tr');
  const q = query.toLowerCase();
  rows.forEach(r => {
    const name = r.cells[0].textContent.toLowerCase();
    r.style.display = name.includes(q) ? '' : 'none';
  });
}

/* PRODUCT CHARTS */
function renderProductCharts() {
  const sorted = [...products].sort((a, b) => b.profit - a.profit);
  const labels = sorted.map(p => pName(p.id));
  const shortLabels = sorted.map(p => pName(p.id).length > 14 ? pName(p.id).substring(0, 12) + '…' : pName(p.id));

  // Grouped bar chart
  const barCtx = document.getElementById('barChart');
  if (barCtx) {
    const c = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: shortLabels,
        datasets: [
          { label: 'Sales ($K)', data: sorted.map(p => p.sales), backgroundColor: '#5a3e2bcc', borderRadius: 4 },
          { label: 'COGS ($K)', data: sorted.map(p => +(p.sales * p.cogs_p / 100).toFixed(1)), backgroundColor: '#c07b1acc', borderRadius: 4 },
          { label: 'Profit ($K)', data: sorted.map(p => p.profit), backgroundColor: '#2b8a5ecc', borderRadius: 4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { font: { size: 11, family: 'Inter' }, usePointStyle: true, pointStyle: 'rectRounded' } },
          tooltip: {
            callbacks: {
              afterBody: (ctx) => {
                const p = sorted[ctx[0].dataIndex];
                return [`Net Margin: ${p.nm}%`, `Profit/Mkt: ${p.roi}x`, `Inventario: ${p.inv}`, `Budget Var: ${p.bvar >= 0 ? '+' : ''}${p.bvar}%`];
              }
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 9 }, maxRotation: 45 } },
          y: { grid: { color: '#e8e0d4' }, ticks: { callback: v => '$' + v + 'K', font: { size: 10 } } }
        }
      }
    });
    activeCharts.push(c);
  }

  // Net margin horizontal bar
  const nmCtx = document.getElementById('nmChart');
  if (nmCtx) {
    const nmSorted = [...products].sort((a, b) => b.nm - a.nm);
    const c = new Chart(nmCtx, {
      type: 'bar',
      data: {
        labels: nmSorted.map(p => pName(p.id).length > 16 ? pName(p.id).substring(0, 14) + '…' : pName(p.id)),
        datasets: [{
          data: nmSorted.map(p => p.nm),
          backgroundColor: nmSorted.map(p => nmColorHex(p.nm) + 'cc'),
          borderColor: nmSorted.map(p => nmColorHex(p.nm)),
          borderWidth: 1, borderRadius: 4,
        }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `Net Margin: ${ctx.raw.toFixed(1)}%` } } },
        scales: {
          x: { grid: { color: '#e8e0d4' }, ticks: { callback: v => v + '%', font: { size: 10 } } },
          y: { grid: { display: false }, ticks: { font: { size: 10, family: 'Inter' } } }
        }
      }
    });
    activeCharts.push(c);
  }

  // Donut
  const donutCtx = document.getElementById('donutChart');
  if (donutCtx) {
    const top6 = [...products].sort((a, b) => b.profit - a.profit).slice(0, 6);
    const othersProfit = products.reduce((s, p) => s + p.profit, 0) - top6.reduce((s, p) => s + p.profit, 0);
    const dLabels = top6.map(p => pName(p.id)).concat(['Altri']);
    const dData = top6.map(p => p.profit).concat([+othersProfit.toFixed(1)]);
    const dColors = ['#5a3e2b', '#7a5c44', '#2b5a3e', '#3a7a54', '#c07b1a', '#2a6cb6', '#a89888'];

    const c = new Chart(donutCtx, {
      type: 'doughnut',
      data: { labels: dLabels, datasets: [{ data: dData, backgroundColor: dColors, borderWidth: 2, borderColor: '#fff' }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '55%',
        plugins: {
          legend: { position: 'right', labels: { font: { size: 11, family: 'Inter' }, usePointStyle: true, pointStyle: 'circle', padding: 12 } },
          tooltip: { callbacks: { label: ctx => `${ctx.label}: $${ctx.raw}K (${(ctx.raw / totalProfit() * 100).toFixed(1)}%)` } }
        }
      }
    });
    activeCharts.push(c);
  }
}

function renderGeoKPIs(data) {
  const ts = data.reduce((s, g) => s + g.sales, 0);
  const tp = data.reduce((s, g) => s + g.profit, 0);
  const anm = (tp / ts * 100).toFixed(1);
  const bestState = data.reduce((a, b) => a.nm > b.nm ? a : b);
  const worstState = data.reduce((a, b) => a.nm < b.nm ? a : b);

  document.getElementById('geo-kpis').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Sales Totali (12 stati)</div>
      <div class="kpi-val">$${ts}K</div>
      <div class="kpi-sub up">↑ 12 stati monitorati</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Profit Totale</div>
      <div class="kpi-val">$${tp.toFixed(0)}K</div>
      <div class="kpi-sub up">NM medio: ${anm}%</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Stato Migliore</div>
      <div class="kpi-val" style="font-size:20px">${bestState.region}</div>
      <div class="kpi-sub up">NM: ${bestState.nm}%</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Stato Critico</div>
      <div class="kpi-val" style="font-size:20px">${worstState.region}</div>
      <div class="kpi-sub down">NM: ${worstState.nm}% · COGS ${worstState.cogs}%</div>
    </div>`;
}

function renderUSMap() {
  const mapC = document.getElementById('map-svg-container');
  if (!mapC) return;

  // Simplified US state grid-map (cartogram style)
  const stateGrid = [
    {code:'WA',x:1,y:0},{code:'OR',x:1,y:1},{code:'CA',x:0,y:2},
    {code:'CO',x:3,y:2},{code:'TX',x:3,y:4},{code:'IL',x:5,y:2},
    {code:'OH',x:6,y:2},{code:'PA',x:7,y:1},{code:'NY',x:7,y:0},
    {code:'MA',x:8,y:0},{code:'GA',x:6,y:4},{code:'FL',x:7,y:5},
  ];

  const cellW = 90, cellH = 70, pad = 6;
  const svgW = 10 * (cellW + pad), svgH = 7 * (cellH + pad);

  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" style="max-height:420px;">`;

  stateGrid.forEach(s => {
    const geo = geoData.find(g => g.code === s.code);
    if (!geo) return;
    const x = s.x * (cellW + pad) + pad;
    const y = s.y * (cellH + pad) + pad;

    // Color based on net margin
    const fill = geo.nm >= 30 ? '#2b8a5e' : geo.nm >= 26 ? '#3a7a54' : geo.nm >= 24 ? '#c07b1a' : '#c94444';
    const opacity = 0.2 + (geo.sales / 150) * 0.7;

    svg += `<g class="map-state" onclick="showGeoPopup('${s.code}', ${x + cellW/2}, ${y})" style="cursor:pointer">
      <rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" rx="10" ry="10"
            fill="${fill}" fill-opacity="${opacity}" stroke="#fff" stroke-width="2"/>
      <text x="${x + cellW/2}" y="${y + 24}" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Inter">${s.code}</text>
      <text x="${x + cellW/2}" y="${y + 42}" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10" font-family="Inter">$${geo.sales}K</text>
      <text x="${x + cellW/2}" y="${y + 56}" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9" font-family="Inter">NM ${geo.nm}%</text>
    </g>`;
  });

  svg += '</svg>';
  mapC.innerHTML = svg;
}

function showGeoPopup(code, px, py) {
  const geo = geoData.find(g => g.code === code);
  if (!geo) return;

  const popup = document.getElementById('map-popup');
  const content = document.getElementById('popup-content');

  let alerts = '';
  if (geo.cogs > 44) alerts += `<div class="alert-item" style="background:var(--red-bg);color:var(--red-text)">⚠ COGS alto: ${geo.cogs}%</div>`;
  if (geo.nm < 26) alerts += `<div class="alert-item" style="background:var(--amber-bg);color:var(--amber-text)">⚠ Margine basso: ${geo.nm}%</div>`;
  if (geo.bvar < -15) alerts += `<div class="alert-item" style="background:var(--red-bg);color:var(--red-text)">⚠ Fuori budget: ${geo.bvar}%</div>`;

  content.innerHTML = `
    <h3>${geo.region} (${geo.code})</h3>
    <div class="map-mini-kpi">
      <div class="mk"><div class="mk-label">Sales</div><div class="mk-val">$${geo.sales}K</div></div>
      <div class="mk"><div class="mk-label">Profit</div><div class="mk-val">$${geo.profit}K</div></div>
      <div class="mk"><div class="mk-label">Net Margin</div><div class="mk-val" style="color:${nmColorHex(geo.nm)}">${geo.nm}%</div></div>
      <div class="mk"><div class="mk-label">Budget Var</div><div class="mk-val" style="color:${geo.bvar >= 0 ? '#2b8a5e' : '#c94444'}">${geo.bvar >= 0 ? '+' : ''}${geo.bvar}%</div></div>
    </div>
    <div class="sparkline-wrap"><canvas id="sparkline-${code}"></canvas></div>
    <div style="margin-bottom:8px">
      <strong style="font-size:11px;color:var(--text-secondary)">Prodotti:</strong><br>
      ${geo.products.map(id => `<span class="pill ${nmClass(products.find(p=>p.id===id)?.nm||0)}" style="margin:2px">${pName(id)}</span>`).join(' ')}
    </div>
    ${alerts ? '<div class="map-alerts" style="margin-top:8px">' + alerts + '</div>' : ''}
  `;

  popup.style.left = Math.min(px, window.innerWidth - 380) + 'px';
  popup.style.top = Math.max(10, py - 20) + 'px';
  popup.classList.add('show');

  // Mini sparkline
  setTimeout(() => {
    const sc = document.getElementById('sparkline-' + code);
    if (sc) {
      const sparkData = geo.products.map(id => {
        const p = products.find(pp => pp.id === id);
        return p ? p.profit : 0;
      });
      const c = new Chart(sc, {
        type: 'line',
        data: {
          labels: geo.products.map(id => pName(id).substring(0, 8)),
          datasets: [{ data: sparkData, borderColor: '#5a3e2b', backgroundColor: 'rgba(90,62,43,0.1)', fill: true, tension: 0.4, pointRadius: 3, borderWidth: 2 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { display: false }, y: { display: false } }
        }
      });
      activeCharts.push(c);
    }
  }, 50);
}

function closePopup() {
  document.getElementById('map-popup').classList.remove('show');
}

function filterGeo() {
  const prodFilter = document.getElementById('geo-product-filter').value;
  const regionFilter = document.getElementById('geo-region-filter').value;

  let filtered = [...geoData];
  if (prodFilter !== 'all') {
    filtered = filtered.filter(g => g.products.includes(parseInt(prodFilter)));
  }
  if (regionFilter !== 'all') {
    filtered = filtered.filter(g => g.code === regionFilter);
  }

  renderGeoKPIs(filtered);
  renderGeoTable(filtered);
  renderGeoChart(filtered);
}

function runSimulation() {

  const priceIncrease = parseFloat(document.getElementById('sim-price')?.value || 0);
  const mktRealloc = parseFloat(document.getElementById('sim-mkt')?.value || 0);

  if (document.getElementById('sim-cogs-val')) document.getElementById('sim-cogs-val').textContent = cogsReduction + '%';
  if (document.getElementById('sim-price-val')) document.getElementById('sim-price-val').textContent = priceIncrease + '%';
  if (document.getElementById('sim-mkt-val')) document.getElementById('sim-mkt-val').textContent = mktRealloc + '%';

  const origProfit = totalProfit();
  const origSales = totalSales();

  // Simulate
  let newProfit = 0;
  let newSales = 0;
  products.forEach(p => {
    const newSale = p.sales * (1 + priceIncrease / 100);
    const newCogs = (p.cogs_p - cogsReduction) / 100 * newSale;
    const expenses = p.exp_p / 100 * newSale;
    const pr = newSale - newCogs - expenses;
    newProfit += pr;
    newSales += newSale;
  });

  // Marketing reallocation effect (estimated)
  const mktBoost = mktRealloc / 100 * origProfit * 0.05; // conservative 5% efficiency gain
  newProfit += mktBoost;

  const newNM = (newProfit / newSales * 100).toFixed(1);
  const profitDelta = newProfit - origProfit;
  const profitDeltaPct = ((profitDelta / origProfit) * 100).toFixed(1);

  const results = document.getElementById('sim-results');
  if (!results) return;

  results.innerHTML = `
    <div class="sr">
      <div class="sr-label">Profit Attuale</div>
      <div class="sr-val" style="color:var(--text-secondary)">$${origProfit.toFixed(0)}K</div>
    </div>
    <div class="sr">
      <div class="sr-label">Profit Simulato</div>
      <div class="sr-val" style="color:${profitDelta >= 0 ? 'var(--green)' : 'var(--red)'}">$${newProfit.toFixed(0)}K</div>
      <div class="sr-delta" style="color:${profitDelta >= 0 ? 'var(--green)' : 'var(--red)'}">
        ${profitDelta >= 0 ? '↑' : '↓'} ${profitDelta >= 0 ? '+' : ''}$${profitDelta.toFixed(1)}K (${profitDeltaPct}%)
      </div>
    </div>
    <div class="sr">
      <div class="sr-label">Net Margin Simulato</div>
      <div class="sr-val" style="color:${nmColorHex(parseFloat(newNM))}">${newNM}%</div>
    </div>
    <div class="sr">
      <div class="sr-label">Sales Simulato</div>
      <div class="sr-val" style="color:var(--primary)">$${newSales.toFixed(0)}K</div>
    </div>
  `;
}

function renderForecastChart() {
  const ctx = document.getElementById('forecastChart');
  if (!ctx) return;

  const cogsR = parseFloat(document.getElementById('sim-cogs')?.value || 0);
  const priceI = parseFloat(document.getElementById('sim-price')?.value || 0);

  // Historical + forecast
  const years = ['2019', '2020', '2021', '2022 (F)', '2023 (F)', '2024 (F)'];
  const historical = [180, 195, 231];

  // Project forward with simulation factors
  const growth = 1 + (priceI / 100) * 0.3 + (cogsR / 100) * 0.4;
  const forecast = [
    +(231 * growth * 1.05).toFixed(0),
    +(231 * growth * 1.10).toFixed(0),
    +(231 * growth * 1.16).toFixed(0),
  ];

  const c = new Chart(ctx, {
    type: 'line',
    data: {
      labels: years,
      datasets: [
        {
          label: 'Profit Storico ($K)',
          data: [...historical, null, null, null],
          borderColor: '#5a3e2b',
          backgroundColor: 'rgba(90,62,43,0.1)',
          borderWidth: 3,
          pointRadius: 5,
          pointBackgroundColor: '#5a3e2b',
          fill: true,
          tension: 0.3,
        },
        {
          label: 'Profit Forecast ($K)',
          data: [null, null, 231, ...forecast],
          borderColor: '#2b8a5e',
          backgroundColor: 'rgba(43,138,94,0.08)',
          borderWidth: 3,
          borderDash: [8, 4],
          pointRadius: 5,
          pointBackgroundColor: '#2b8a5e',
          fill: true,
          tension: 0.3,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { font: { size: 11, family: 'Inter' }, usePointStyle: true } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: '#e8e0d4' }, ticks: { callback: v => '$' + v + 'K', font: { size: 10 } } }
      }
    }
  });
  activeCharts.push(c);
}

function renderReallocBars() {
  const el = document.getElementById('realloc-bars');
  if (!el) return;

  // Sort by ROI — show where to take from and where to send
  const sorted = [...products].sort((a, b) => b.roi - a.roi);
  const topPerformers = sorted.filter(p => p.roi >= 2);
  const lowPerformers = sorted.filter(p => p.roi < 1.2);

  let html = '<div style="margin-bottom:16px"><strong style="font-size:12px;color:var(--green-text)">✓ Top performer — Aumentare budget:</strong></div>';
  topPerformers.forEach(p => {
    const w = Math.round(p.roi / 3 * 100);
    html += `<div class="bar-row">
      <span class="bar-label">${pName(p.id)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:var(--green)"></div></div>
      <span class="bar-num" style="color:var(--green)">${p.roi.toFixed(2)}x</span>
    </div>`;
  });

  html += '<div style="margin:16px 0 12px"><strong style="font-size:12px;color:var(--red-text)">✕ Low performer — Ridurre budget:</strong></div>';
  lowPerformers.forEach(p => {
    const w = Math.round(p.roi / 3 * 100);
    html += `<div class="bar-row">
      <span class="bar-label">${pName(p.id)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:var(--red)"></div></div>
      <span class="bar-num" style="color:var(--red)">${p.roi.toFixed(2)}x</span>
    </div>`;
  });

  el.innerHTML = html;
}
